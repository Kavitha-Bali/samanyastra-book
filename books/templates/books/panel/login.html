{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin Login – Samanyastra</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>
  <style>
    body { background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 50%, #312e81 100%); min-height: 100vh; font-family: 'Segoe UI', sans-serif; }
    .auth-card { background: #fff; border-radius: 18px; padding: 2.5rem 2rem; width: 100%; max-width: 400px; box-shadow: 0 24px 64px rgba(0,0,0,0.5); }
    .auth-logo { font-size: 2.2rem; color: #f59e0b; }
    .brand-name { font-size: 1.5rem; font-weight: 800; color: #1e293b; }
    .brand-name span { color: #6366f1; }
    .input-group-text { background: #f8fafc; border-right: none; color: #94a3b8; }
    .form-control { border-left: none; }
    .form-control:focus { box-shadow: none; border-color: #6366f1; }
    .input-group:focus-within .input-group-text { border-color: #6366f1; color: #6366f1; }
    .btn-auth { background: linear-gradient(135deg, #6366f1, #4f46e5); border: none; font-weight: 700; padding: 0.7rem; font-size: 1rem; }
    .btn-auth:hover { opacity: 0.9; transform: translateY(-1px); box-shadow: 0 6px 20px rgba(99,102,241,0.4); }
    .admin-badge-info { background: #fef3c7; border: 1px solid #fde68a; border-radius: 8px; padding: 8px 12px; font-size: 0.8rem; color: #92400e; }
  </style>
</head>
<body class="d-flex align-items-center justify-content-center p-3">
<div class="auth-card">
  <div class="text-center mb-4">
    <div class="auth-logo mb-2"><i class="fas fa-book-open"></i></div>
    <div class="brand-name">Saman<span>yastra</span></div>
    <p class="text-muted mt-1" style="font-size:0.85rem;">Admin Panel Access</p>
  </div>

  <div class="admin-badge-info mb-3 d-flex align-items-center gap-2">
    <i class="fas fa-shield-alt text-warning"></i>
    <span>Staff accounts only. Unauthorized access is prohibited.</span>
  </div>

  {% if error %}
    <div class="alert alert-danger d-flex align-items-center gap-2 py-2" role="alert">
      <i class="fas fa-exclamation-circle"></i> {{ error }}
    </div>
  {% endif %}

  <form method="post">
    {% csrf_token %}
    <div class="mb-3">
      <label class="form-label fw-semibold text-muted" style="font-size:0.78rem;text-transform:uppercase;letter-spacing:0.5px;">Username</label>
      <div class="input-group">
        <span class="input-group-text"><i class="fas fa-user-shield"></i></span>
        <input type="text" name="username" class="form-control" placeholder="Admin username" required autofocus/>
      </div>
    </div>
    <div class="mb-4">
      <label class="form-label fw-semibold text-muted" style="font-size:0.78rem;text-transform:uppercase;letter-spacing:0.5px;">Password</label>
      <div class="input-group">
        <span class="input-group-text"><i class="fas fa-lock"></i></span>
        <input type="password" name="password" class="form-control" placeholder="Admin password" required/>
      </div>
    </div>
    <button type="submit" class="btn btn-auth btn-primary w-100 text-white">
      <i class="fas fa-sign-in-alt me-2"></i>Login to Panel
    </button>
  </form>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
