{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Register – Samanyastra</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>
  <style>
    body { background: linear-gradient(135deg, #1a1f3c 0%, #312e81 50%, #4f46e5 100%); min-height: 100vh; font-family: 'Segoe UI', sans-serif; }
    .auth-card { background: #fff; border-radius: 18px; padding: 2.5rem 2rem; width: 100%; max-width: 420px; box-shadow: 0 24px 64px rgba(0,0,0,0.4); }
    .auth-logo { font-size: 2.2rem; color: #4f46e5; }
    .brand-name { font-size: 1.5rem; font-weight: 800; color: #1e293b; }
    .brand-name span { color: #6366f1; }
    .input-group-text { background: #f8fafc; border-right: none; color: #94a3b8; }
    .form-control { border-left: none; }
    .form-control:focus { box-shadow: none; border-color: #6366f1; }
    .input-group:focus-within .input-group-text { border-color: #6366f1; color: #6366f1; }
    .btn-auth { background: linear-gradient(135deg, #6366f1, #4f46e5); border: none; font-weight: 700; padding: 0.7rem; font-size: 1rem; }
    .btn-auth:hover { opacity: 0.9; transform: translateY(-1px); box-shadow: 0 6px 20px rgba(99,102,241,0.4); }
  </style>
</head>
<body class="d-flex align-items-center justify-content-center p-3">
<div class="auth-card">
  <div class="text-center mb-4">
    <div class="auth-logo mb-2"><i class="fas fa-book-open"></i></div>
    <div class="brand-name">Saman<span>yastra</span></div>
    <p class="text-muted mt-1" style="font-size:0.85rem;">Create your free account</p>
  </div>

  {% if error %}
    <div class="alert alert-danger d-flex align-items-center gap-2 py-2" role="alert">
      <i class="fas fa-exclamation-circle"></i> {{ error }}
    </div>
  {% endif %}

  <form method="post">
    {% csrf_token %}
    <div class="mb-3">
      <label class="form-label fw-semibold text-muted" style="font-size:0.78rem;text-transform:uppercase;letter-spacing:0.5px;">Username</label>
      <div class="input-group">
        <span class="input-group-text"><i class="fas fa-user"></i></span>
        <input type="text" name="username" class="form-control" placeholder="Choose a username" required autofocus/>
      </div>
    </div>
    <div class="mb-3">
      <label class="form-label fw-semibold text-muted" style="font-size:0.78rem;text-transform:uppercase;letter-spacing:0.5px;">Email <span class="text-muted fw-normal">(optional)</span></label>
      <div class="input-group">
        <span class="input-group-text"><i class="fas fa-envelope"></i></span>
        <input type="email" name="email" class="form-control" placeholder="you@example.com"/>
      </div>
    </div>
    <div class="mb-3">
      <label class="form-label fw-semibold text-muted" style="font-size:0.78rem;text-transform:uppercase;letter-spacing:0.5px;">Password</label>
      <div class="input-group">
        <span class="input-group-text"><i class="fas fa-lock"></i></span>
        <input type="password" name="password" class="form-control" placeholder="Create a password" required/>
      </div>
    </div>
    <div class="mb-4">
      <label class="form-label fw-semibold text-muted" style="font-size:0.78rem;text-transform:uppercase;letter-spacing:0.5px;">Confirm Password</label>
      <div class="input-group">
        <span class="input-group-text"><i class="fas fa-lock"></i></span>
        <input type="password" name="password2" class="form-control" placeholder="Repeat your password" required/>
      </div>
    </div>
    <button type="submit" class="btn btn-auth btn-primary w-100 text-white">
      <i class="fas fa-user-plus me-2"></i>Create Account
    </button>
  </form>

  <p class="text-center mt-3 mb-0" style="font-size:0.85rem;color:#64748b;">
    Already have an account? <a href="{% url 'user-login' %}" style="color:#6366f1;font-weight:600;">Login</a>
  </p>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
