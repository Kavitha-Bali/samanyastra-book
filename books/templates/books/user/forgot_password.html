{% extends "books/user/base.html" %}
{% block content %}
<div style="max-width:420px;margin:60px auto;">
  <h2>Forgot Password</h2>

  {% for message in messages %}
    <p style="color:green;">{{ message }}</p>
  {% endfor %}

  <form method="POST">
    {% csrf_token %}
    <label>Email address</label><br/>
    <input type="email" name="email" required style="width:100%;padding:8px;margin:8px 0 16px;"/>
    <button type="submit">Send Reset Link</button>
  </form>

  <p><a href="{% url 'user-login' %}">Back to Login</a></p>
</div>
{% endblock %}
