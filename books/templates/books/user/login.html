{% load static %}
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login – Samanyastra</title>
    <link
      rel="icon"
      type="image/jpeg"
      href="{% static 'books/favicon.jpg' %}"
    />
    <link rel="apple-touch-icon" href="{% static 'books/favicon.jpg' %}" />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    />
    <style>
      body {
        background: linear-gradient(
          135deg,
          #1a1f3c 0%,
          #312e81 50%,
          #4f46e5 100%
        );
        min-height: 100vh;
        font-family: "Segoe UI", sans-serif;
      }
      .auth-card {
        background: #fff;
        border-radius: 18px;
        padding: 2.5rem 2rem;
        width: 100%;
        max-width: 420px;
        box-shadow: 0 24px 64px rgba(0, 0, 0, 0.4);
      }
      .auth-logo {
        font-size: 2.2rem;
        color: #4f46e5;
      }
      .brand-name {
        font-size: 1.5rem;
        font-weight: 800;
        color: #1e293b;
      }
      .brand-name span {
        color: #6366f1;
      }
      .input-group-text {
        background: #f8fafc;
        border-right: none;
        color: #94a3b8;
      }
      .form-control {
        border-left: none;
      }
      .form-control:focus {
        box-shadow: none;
        border-color: #6366f1;
      }
      .input-group:focus-within .input-group-text {
        border-color: #6366f1;
        color: #6366f1;
      }
      .btn-auth {
        background: linear-gradient(135deg, #6366f1, #4f46e5);
        border: none;
        font-weight: 700;
        padding: 0.7rem;
        font-size: 1rem;
        letter-spacing: 0.3px;
      }
      .btn-auth:hover {
        opacity: 0.9;
        transform: translateY(-1px);
        box-shadow: 0 6px 20px rgba(99, 102, 241, 0.4);
      }
      .auth-divider {
        display: flex;
        align-items: center;
        gap: 0.75rem;
        margin: 1.1rem 0;
        color: #9ca3af;
        font-size: 0.75rem;
        text-transform: uppercase;
        letter-spacing: 0.5px;
      }
      .auth-divider::before,
      .auth-divider::after {
        content: "";
        flex: 1;
        height: 1px;
        background: #d1d5db;
      }
      .btn-sso {
        background: linear-gradient(135deg, #4f46e5 0%, #9333ea 55%, #776aea 100%);
        border: none;
        color: #fff;
        font-weight: 700;
        padding: 0.7rem;
        font-size: 1rem;
        letter-spacing: 0.3px;
        box-shadow: 0 4px 16px rgba(79, 70, 229, 0.35);
        transition: opacity 0.2s, transform 0.15s, box-shadow 0.2s, background 0.2s;
      }
      .btn-sso:hover {
        color: #fff;
        background: linear-gradient(135deg, #4338ca 0%, #9333ea 55%, #776aea 100%);
        transform: translateY(-1px);
        box-shadow: 0 8px 24px rgba(79, 70, 229, 0.45);
      }
      .btn-sso:active {
        transform: translateY(0);
      }
    </style>
  </head>
  <body class="d-flex align-items-center justify-content-center p-3">
    <div class="auth-card">
      <div class="text-center mb-4">
        <div class="auth-logo mb-2"><i class="fas fa-book-open"></i></div>
        <div class="brand-name">Saman<span>yastra</span></div>
        <p class="text-muted mt-1" style="font-size: 0.85rem">
          Sign in to your account
        </p>
      </div>

      {% if error %}
      <div
        class="alert alert-danger d-flex align-items-center gap-2 py-2"
        role="alert"
      >
        <i class="fas fa-exclamation-circle"></i> {{ error }}
      </div>
      {% endif %}

      <form method="post">
        {% csrf_token %}
        <div class="mb-3">
          <label
            class="form-label fw-semibold text-muted"
            style="
              font-size: 0.78rem;
              text-transform: uppercase;
              letter-spacing: 0.5px;
            "
            >Username</label
          >
          <div class="input-group">
            <span class="input-group-text"><i class="fas fa-user"></i></span>
            <input
              type="text"
              name="username"
              class="form-control"
              placeholder="Enter username"
              required
              autofocus
            />
          </div>
        </div>
        <div class="mb-4">
          <div class="d-flex justify-content-between align-items-center">
            <label
              class="form-label fw-semibold text-muted"
              style="
                font-size: 0.78rem;
                text-transform: uppercase;
                letter-spacing: 0.5px;
              "
              >Password</label
            >
            <a
              href="{% url 'forgot-password' %}"
              style="font-size: 0.78rem; color: #6366f1; font-weight: 600"
              >Forgot password?</a
            >
          </div>
          <div class="input-group">
            <span class="input-group-text"><i class="fas fa-lock"></i></span>
            <input
              type="password"
              name="password"
              class="form-control"
              placeholder="Enter password"
              required
            />
          </div>
        </div>
        <button type="submit" class="btn btn-auth btn-primary w-100 text-white">
          <i class="fas fa-sign-in-alt me-2"></i>Login
        </button>

        <div class="auth-divider">or</div>

        <a
          class="btn btn-sso w-100 d-flex align-items-center justify-content-center"
          href="{% url 'sso_integration:login-with-sso' %}?next={{ next|urlencode }}"
        >
          <i class="fas fa-shield-halved me-2"></i>Login with Samanyastra
        </a>
      </form>

      <p
        class="text-center mt-3 mb-0"
        style="font-size: 0.85rem; color: #64748b"
      >
        New here?
        <a
          href="{% url 'user-register' %}"
          style="color: #6366f1; font-weight: 600"
          >Create account</a
        >
      </p>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
