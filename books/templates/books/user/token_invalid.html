{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Link Expired – Samanyastra</title>
  <link rel="icon" type="image/jpeg" href="{% static 'books/favicon.jpg' %}"/>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>
  <style>
    body { background: linear-gradient(135deg, #1a1f3c 0%, #312e81 50%, #4f46e5 100%); min-height: 100vh; font-family: 'Segoe UI', sans-serif; }
    .auth-card { background: #fff; border-radius: 18px; padding: 2.5rem 2rem; width: 100%; max-width: 420px; box-shadow: 0 24px 64px rgba(0,0,0,0.4); text-align: center; }
    .icon-wrap { font-size: 3rem; color: #ef4444; }
    .brand-name { font-size: 1.5rem; font-weight: 800; color: #1e293b; }
    .brand-name span { color: #6366f1; }
    .btn-auth { background: linear-gradient(135deg, #6366f1, #4f46e5); border: none; font-weight: 700; padding: 0.7rem; font-size: 1rem; }
    .btn-auth:hover { opacity: 0.9; transform: translateY(-1px); box-shadow: 0 6px 20px rgba(99,102,241,0.4); }
  </style>
</head>
<body class="d-flex align-items-center justify-content-center p-3">
<div class="auth-card">
  <div class="icon-wrap mb-3"><i class="fas fa-link-slash"></i></div>
  <div class="brand-name mb-1">Saman<span>yastra</span></div>
  <h5 class="fw-bold mt-3 mb-2" style="color:#1e293b;">Link Invalid or Expired</h5>
  <p class="text-muted mb-4" style="font-size:0.9rem;">
    This password reset link has already been used or has expired.<br/>
    Please request a new one.
  </p>
  <a href="{% url 'forgot-password' %}" class="btn btn-auth btn-primary w-100 text-white mb-3">
    <i class="fas fa-redo me-2"></i>Request New Link
  </a>
  <p style="font-size:0.85rem;color:#64748b;">
    <a href="{% url 'user-login' %}" style="color:#6366f1;font-weight:600;">Back to Login</a>
  </p>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
